# Alacritty Configuration - Synthesis-Dark Master Palette v2.0.0

[env]
TERM = "alacritty"

[window]
decorations = "full"
dynamic_padding = true
opacity = 0.95
title = "Synthesis Alacritty"
dynamic_title = true

[window.padding]
x = 8
y = 8

[font]
size = 11.0

[font.normal]
family = "Spline Sans Mono"
style = "Regular"

[font.bold]
family = "Spline Sans Mono"
style = "Bold"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750

[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"
bright_foreground = "#ffffff"

[colors.cursor]
text = "#282a36"
cursor = "#f8f8f2"

[colors.selection]
text = "#f8f8f2"
background = "#44475a"

# Normal colors
[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#8e95b8" # Indigo-Gray (Synthesis Accent)
magenta = "#bd93f9" # Purple
cyan    = "#8be9fd"
white   = "#f8f8f2"

# Bright colors
[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#b4befe" # Lavender
magenta = "#d6acff"
cyan    = "#a4ffff"
white   = "#ffffff"

[Service]
# Clear existing ExecStart
ExecStart=
# Start kmscon with Synthesis Dark Palette
# Palette: Black, Red, Green, Yellow, Blue, Magenta, Cyan, White (Normal)
#          Black, Red, Green, Yellow, Blue, Magenta, Cyan, White (Bright)
ExecStart=/usr/bin/kmscon --config-file /etc/kmscon/kmscon.conf \
    --term-palette #232530,#f38ba8,#a6e3a1,#f9e2af,#89b4fa,#cba6f7,#89dceb,#bac2de,#585b70,#f38ba8,#a6e3a1,#f9e2af,#89b4fa,#cba6f7,#89dceb,#f4f4f5 \
    %I


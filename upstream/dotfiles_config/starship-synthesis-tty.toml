# Synthesis Dark TTY Starship Configuration
# Optimized for KMSCON 16-color palette

format = """
[](color_purple)\
$os
$username
[](bg:color_teal fg:color_purple)
$directory
[](fg:color_teal bg:color_bg)
$git_branch
$git_status
[](fg:color_bg)
$line_break
$character"""

palette = "synthesis_dark"

[palettes.synthesis_dark]
color_bg = "#232530"
color_fg = "#f4f4f5"
color_purple = "#cba6f7"
color_teal = "#17b169"
color_red = "#f38ba8"
color_yellow = "#f9e2af"
color_blue = "#89b4fa"

[os]
disabled = false
style = "bg:color_purple fg:color_bg"
format = "[$symbol ]($style)"

[os.symbols]
Arch = "󰣇"
Linux = ""

[username]
show_always = true
style_user = "bg:color_purple fg:color_bg bold"
style_root = "bg:color_red fg:color_bg bold"
format = "[ $user ]($style)"

[directory]
style = "bg:color_teal fg:color_bg"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bg:color_bg fg:color_purple"
format = "[[ $symbol$branch ](fg:color_purple bg:color_bg)]($style)"

[git_status]
style = "bg:color_bg fg:color_red"
format = "[[($all_status$ahead_behind )](fg:color_red bg:color_bg)]($style)"

[character]
success_symbol = "[➜](bold color_teal)"
error_symbol = "[➜](bold color_red)"

[Service]
# Clear existing ExecStart
ExecStart=
# Start kmscon with Dracula Palette and config
# Palette order: black, red, green, yellow, blue, magenta, cyan, white (normal then bright)
ExecStart=/usr/bin/kmscon --config-file /etc/kmscon/kmscon.conf --term-palette #21222c,#ff5555,#50fa7b,#f1fa8c,#bd93f9,#ff79c6,#8be9fd,#f8f8f2,#6272a4,#ff6e6e,#69ff94,#ffffa5,#d6acff,#ff92df,#a4ffff,#ffffff %I
